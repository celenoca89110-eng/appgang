<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GangApp — Registre économique GTA RP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<!-- ================= ECRAN DE CONNEXION ================= -->
<div id="loginScreen" class="login-screen">
  <div class="login-card">
    <div class="eyebrow">Accès restreint</div>
    <h1>GANGAPP</h1>
    <p class="login-sub">Registre économique — Serveur GTA RP</p>
    <form id="loginForm">
      <input type="text" id="loginUsername" placeholder="Nom d'utilisateur" autocomplete="username" required>
      <input type="password" id="loginPassword" placeholder="Mot de passe" autocomplete="current-password" required>
      <button type="submit" class="btn">Se connecter</button>
      <div class="login-error" id="loginError"></div>
    </form>
  </div>
</div>

<!-- ================= APPLICATION ================= -->
<div class="app" id="appRoot" style="display:none;">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="eyebrow">Registre confidentiel</div>
      <h1>DOSSIERS GANGS</h1>
      <div class="conn-status" id="connStatus">
        <span class="dot-status"></span> <span id="connLabel">Connexion...</span>
      </div>
    </div>
    <div class="gang-list" id="gangList"></div>
    <form class="add-gang-form" id="addGangForm">
      <input type="text" id="newGangName" placeholder="Nom du nouveau gang..." maxlength="40" autocomplete="off">
      <button type="submit" class="btn" id="addGangBtn">+ Gang</button>
    </form>
    <div class="sidebar-footer">
      <div class="me" id="meInfo"></div>
      <div class="sidebar-footer-actions">
        <button class="icon-btn subtle" id="auditBtn" title="Historique des modifications">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="9"/></svg>
        </button>
        <button class="icon-btn subtle" id="usersBtn" title="Gestion des utilisateurs">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        </button>
        <button class="icon-btn" id="logoutBtn" title="Déconnexion">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
        </button>
      </div>
    </div>
  </aside>

  <main>
    <div class="toolbar">
      <div class="search-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" id="searchInput" placeholder="Rechercher un item, dans tous les gangs...">
      </div>
      <select id="sortSelect">
        <option value="none">Ordre par défaut</option>
        <option value="name">Nom (A → Z)</option>
        <option value="price_asc">Prix croissant</option>
        <option value="price_desc">Prix décroissant</option>
      </select>
      <div class="spacer"></div>
      <button class="btn ghost small" id="exportBtn">⤓ Exporter JSON</button>
    </div>
    <div class="content" id="content"></div>
  </main>
</div>

<!-- ================= MODALE AUDIT LOG ================= -->
<div class="modal-backdrop" id="auditModal" style="display:none;">
  <div class="modal">
    <div class="modal-header">
      <h2>Historique des modifications</h2>
      <button class="icon-btn" id="closeAuditModal">✕</button>
    </div>
    <div class="modal-body" id="auditBody"></div>
  </div>
</div>

<!-- ================= MODALE UTILISATEURS ================= -->
<div class="modal-backdrop" id="usersModal" style="display:none;">
  <div class="modal">
    <div class="modal-header">
      <h2>Gestion des utilisateurs</h2>
      <button class="icon-btn" id="closeUsersModal">✕</button>
    </div>
    <div class="modal-body">
      <form id="createUserForm" class="create-user-form">
        <input type="text" id="newUsername" placeholder="Nom d'utilisateur" required maxlength="30">
        <input type="password" id="newUserPassword" placeholder="Mot de passe (min. 6)" required minlength="6">
        <select id="newUserRole">
          <option value="viewer">Viewer</option>
          <option value="staff">Staff</option>
          <option value="admin">Admin</option>
        </select>
        <button type="submit" class="btn small">+ Créer</button>
      </form>
      <div id="usersListBody"></div>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/js/api.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
